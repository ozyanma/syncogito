<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>検索結果 | シン・コギト株式会社</title>
    <style>
        :root { --corp-blue: #0056b3; --chat-bg: #121212; --yu-pink: #ffb6c1; }
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; overflow: hidden; }
        #web-site { width: 65%; background: #fff; overflow-y: auto; display: flex; flex-direction: column; } #results-content { padding: 30px; }
        .result-item { margin-bottom: 25px; }
        .result-item a { color: #1a0dab; font-size: 1.2rem; text-decoration: none; }
        .result-item a:hover { text-decoration: underline; }
        .result-url { color: #006621; font-size: 0.85rem; margin-bottom: 4px; }
        .result-desc { color: #545454; font-size: 0.9rem; line-height: 1.4; }
        .secret-link { border-left: 3px solid #ff3333; padding-left: 10px; background: #fffcfc; }
        .secret-mode { background: #000 !important; color: #ccc !important; }
        .secret-mode a { color: #55ff55 !important; }
        .secret-mode .result-desc { color: #888 !important; }
        .secret-mode .result-url { color: #3b8b3b !important; }
        .secret-mode h3 { color: #ff3333 !important; }
        
        #chat-window { width: 35%; background: var(--chat-bg); color: white; display: flex; flex-direction: column; border-left: 2px solid #222; }
        .chat-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #1a1a1a; border-bottom: 1px solid #333; font-size: 0.85rem; }
        .btn-clear { background: #444; color: #fff; border: 1px solid #666; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        .btn-clear:hover { background: #ff4444; border-color: #ff4444; }
        #chat-log { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 85%; font-size: 0.9rem; }
        .yu { background: #2a2a2a; color: var(--yu-pink); align-self: flex-start; }
        .me { background: var(--corp-blue); color: white; align-self: flex-end; }
        
        #options-area { padding: 20px; background: #1a1a1a; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        button.opt { background: #222; border: 1px solid #555; color: #ddd; padding: 12px; cursor: pointer; border-radius: 6px; text-align: left; }
        button.opt:hover { background: #333; border-color: var(--yu-pink); color: white; }
        button.opt:disabled { background: #1a1a1a; border-color: #333; color: #555; cursor: default; }
    
        header { padding: 15px 30px; border-bottom: 1px solid #eaeaea; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-mark { font-size: 2rem; color: var(--corp-blue); font-weight: 900; letter-spacing: -2px; }
        .logo-text { font-size: 1.2rem; font-weight: bold; color: #111; line-height: 1.2; }
        .logo-sub { font-size: 0.7rem; color: #666; font-weight: normal; }
        .search-container { display: flex; align-items: center; border: 1px solid #ccc; border-radius: 4px; overflow: hidden; }
        .search-container input { border: none; padding: 8px 12px; outline: none; width: 200px; font-size: 0.85rem; color: #000; }
        .search-container button { background: white; border: none; padding: 8px 12px; cursor: pointer; color: #555; }
        .global-nav { display: flex; justify-content: space-between; padding: 0 20px; font-size: 0.85rem; font-weight: bold; color: #444; }
        .global-nav a { text-decoration: none; color: inherit; padding: 5px 10px; }
        
        .secret-mode header { border-bottom: 1px solid #444; }
        .secret-mode .logo-text { color: #ddd; }
        .secret-mode .logo-sub { color: #aaa; }
        .secret-mode .search-container { border-color: #555; }
        .secret-mode .search-container input { background: #111; color: #fff; }
        .secret-mode .search-container button { background: #333; color: #fff; }
        .secret-mode .global-nav { color: #aaa; }

    </style>
</head>
<body>
<div id="web-site">

    <header>
        <div class="header-top">
            <div class="logo-area">
                <div class="logo-mark">SC</div>
                <div class="logo-text">シン・コギト株式会社<br><span class="logo-sub">AI技術で、新しい世界を。</span></div>
            </div>
            <form action="results.html" method="GET" class="search-container">
                <input type="text" name="q" placeholder="サイト内を検索" required>
                <button type="submit">🔍</button>
            </form>
        </div>
        <nav class="global-nav">
            <a href="index.html">HOME</a><a href="p2.html">ニュース</a><a href="p3.html">会社案内</a><a href="p4.html">代表あいさつ</a><a href="p5.html">研究メンバー</a><a href="p6.html">お問い合わせ</a>
        </nav>
    </header>

    <div id="results-content">
        <h3 id="search-title">「」の検索結果</h3>
        <hr>
        <div id="results-list"></div>
        <br><a href="index.html">← トップへ戻る</a>
    </div>

    <div style="margin-top: auto; padding: 15px 30px; display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px solid #eaeaea;">
        <div style="font-size: 0.75rem; color: #999;">※このWebサイトの内容はフィクションであり、実在の人物・団体とは一切関係がありません。</div>
        <div style="font-size: 1rem; color: #777; font-weight: bold; font-family: inherit; letter-spacing: 1px;"><span style='color: #333;'>-</span><span style='color: #555;'>/59(LV1)</span></div>
    </div>
</div>

<div id="chat-window">
    <div class="chat-header">
        <span>📶 SYNC_COMM LINK</span>
        <button class="btn-clear" onclick="clearChat()">ログ消去</button>
    </div>
    <div id="chat-log"></div>
    <div id="options-area"></div>
</div>

<script src="data.js"></script>
<script>
    // ==========================================
    // 【追加】後半ステージで使うキーワードのリスト
    // ==========================================
    const laterKeywords = [
        "定期配信", 
        "美空セシル", 
        "NAS個人フォルダ", 
        "ノルアtoヒスタ", 
        "ヒスタtoノルア",
        "seshiru.misora.400@syncogito.xxxx.net", 
        "adorena.rin.1108@syncogito.xxxx.net",
        "Syn-Core"
        // ※ ここに後半で反応させたいキーワードを自由に追加してください
    ];

    const params = new URLSearchParams(window.location.search);
    const query = params.get('q') || "";
    document.getElementById('search-title').innerText = `「${query}」の検索結果`;

    const listArea = document.getElementById('results-list');
    
    const queryWords = query.trim().split(/[\s ]+/);
    
    let exactMatches = [];
    let partialMatches = [];

    // ==========================================
    // 【修正】入力されたクエリが後半キーワードに完全一致するか判定
    // ==========================================
    let isLaterKeywordMatched = false;
    if (query && query !== "-") {
        isLaterKeywordMatched = queryWords.some(qw => 
            laterKeywords.some(lk => lk.toLowerCase() === qw.toLowerCase())
        );
    }

    if (query && query !== "-") {
        pagesData.forEach(p => {
            if (!p.searchKey || p.searchKey === "-") return;
            
            const orGroups = p.searchKey.split(/\||∣|｜/);
            
            let isExact = false;
            let isPartial = false;

            orGroups.forEach(group => {
                const requiredWords = group.trim().split(/[\s ]+/);
                let matchCount = 0;
                requiredWords.forEach(req => {
                    if (!req) return;
                    // ==========================================
                    // 【修正】部分一致（includes）から完全一致（===）に変更
                    // ==========================================
                    const isMatched = queryWords.some(qw => req.toLowerCase() === qw.toLowerCase());
                    if (isMatched) matchCount++;
                });
                
                if (matchCount > 0) {
                    if (matchCount === requiredWords.length) {
                        isExact = true;
                    } else {
                        isPartial = true;
                    }
                }
            });
            
            if (isExact) {
                exactMatches.push(p);
            } else if (isPartial) {
                partialMatches.push(p);
            }
        });
    }

    const hasSecret = exactMatches.some(l => l.secret);
    if (hasSecret) {
        document.getElementById('web-site').classList.add('secret-mode');
    }
    
    if (exactMatches.length > 0) {
        exactMatches.forEach(l => {
            const div = document.createElement('div');
            div.className = "result-item";
            const desc = l.desc ? l.desc : l.content.replace(/<[^>]*>?/gm, '').trim();
            div.innerHTML = `<div class="result-url">syncogito/${l.id}</div><a href="${l.id}.html">${l.title}</a><div class="result-desc">${desc.substring(0, 50)}...</div>`;
            listArea.appendChild(div);
        });
    // ==========================================
    // 【追加】前半に完全一致がなく、後半キーワードにヒットした場合
    // ==========================================
    } else if (isLaterKeywordMatched) {
        listArea.innerHTML = `
            <div style="
                margin: 20px 0; 
                padding: 25px; 
                border: 1px dashed #eb5757; 
                background-color: #fff5f5; 
                border-radius: 6px; 
                text-align: center;
            ">
                <p style="color: #eb5757; font-weight: bold; font-size: 1.1rem; margin: 0 0 10px 0;">
                    手がかりへのアクセス制限
                </p>
                <p style="color: #333; font-size: 0.95rem; margin: 0; line-height: 1.6;">
                    このキーワードに関するデータは、物語の【後半ステージ】で解放されます。<br>
                    後半の公開を楽しみにお待ちください。
                </p>
            </div>
        `;
    } else if (partialMatches.length > 0) {
        listArea.innerHTML = "<p style='color: #ff4444; font-weight: bold;'>検索結果が多すぎます。2つ目の絞り込みワードを追加して検索してください。</p>";
    } else {
        listArea.innerHTML = "<p>該当するページは見つかりませんでした。</p>";
    }

    // チャット周り
    let chatHistory = JSON.parse(localStorage.getItem('chatHistory')) || [];
    
    // 検索結果ページ専用のシナリオ
    const scenarios = {
        "start": [
            { text: "検索結果が出たよ", next: "found" },
            { text: "何か社内の機密情報にもアクセスできてる？", next: "notfound" }
        ],
        "found": { msg: "本当！？ 私の脱出の手がかりになりそうなページある？", next: "start" },
        "notfound": { msg: "何でだろう？でもこれで調査できるね！", next: "start" }
    };

    function saveAndRender() {
        const log = document.getElementById('chat-log');
        log.innerHTML = "";
        chatHistory.forEach(m => {
            const div = document.createElement('div');
            div.className = `msg ${m.sender}`;
            div.innerText = (m.sender === 'yu' ? 'ゆりかっぺ：' : '自分：') + m.text;
            log.appendChild(div);
        });
        requestAnimationFrame(() => { log.scrollTop = log.scrollHeight; });
        localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
    }

    function showOptions(key) {
        const area = document.getElementById('options-area');
        area.innerHTML = "";
        const opts = scenarios[key];
        if (Array.isArray(opts)) {
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "opt";
                btn.innerText = opt.text;
                btn.onclick = () => {
                    chatHistory.push({ sender: 'me', text: opt.text });
                    saveAndRender();
                    area.querySelectorAll('button').forEach(b => b.disabled = true);
                    setTimeout(() => {
                        const res = scenarios[opt.next];
                        if (res.msg) chatHistory.push({ sender: 'yu', text: res.msg });
                        saveAndRender();
                        showOptions(res.next);
                    }, 800);
                };
                area.appendChild(btn);
            });
        }
    }

    function clearChat() {
        if(confirm("通信履歴を消去してリセットしますか？")) {
            localStorage.clear();
            window.location.reload();
        }
    }

    if (hasSecret && !chatHistory.some(m => m.text.includes('この画面、なんか暗い'))) {
        setTimeout(() => {
            chatHistory.push({ sender: 'yu', text: '……この画面、なんか暗いし変じゃない？気をつけてね。' });
            saveAndRender();
        }, 1000);
    }

    saveAndRender();
    showOptions("start");
</script>
</body>
</html>
