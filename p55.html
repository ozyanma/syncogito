<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Vocal-Sync広告イメージ | シン・コギト株式会社</title>
    <style>
        :root { 
            --corp-blue: #0056b3; 
            --chat-bg: #121212; 
            --yu-pink: #ffb6c1; 
            
            /* Secret Mode Colors */
            --secret-bg: #050505;
            --secret-text: #e0e0e0;
            --secret-accent: #20c20e;
        }
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; overflow: hidden; }
        #web-site { width: 65%; overflow-y: auto; background: #fff; color: #333; display: flex; flex-direction: column;}
        #content-body { padding: 40px; }
        
        #chat-window { width: 35%; background: var(--chat-bg); color: white; display: flex; flex-direction: column; border-left: 2px solid #222; }
        .chat-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #1a1a1a; border-bottom: 1px solid #333; font-size: 0.85rem; }
        .btn-clear { background: #444; color: #fff; border: 1px solid #666; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        .btn-clear:hover { background: #ff4444; border-color: #ff4444; }
        #chat-log { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 85%; font-size: 0.9rem; }
        .yu { background: #2a2a2a; color: var(--yu-pink); align-self: flex-start; }
        .me { background: var(--corp-blue); color: white; align-self: flex-end; }
        
        #options-area { padding: 20px; background: #1a1a1a; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        button.opt { background: #222; border: 1px solid #555; color: #ddd; padding: 12px; cursor: pointer; border-radius: 6px; text-align: left; }
        button.opt:hover { background: #333; border-color: var(--yu-pink); color: white; }
        button.opt:disabled { background: #1a1a1a; border-color: #333; color: #555; cursor: default; }

        header { padding: 15px 30px; border-bottom: 1px solid #eaeaea; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-mark { font-size: 2rem; color: var(--corp-blue); font-weight: 900; letter-spacing: -2px; }
        .logo-text { font-size: 1.2rem; font-weight: bold; color: #111; line-height: 1.2; }
        .logo-sub { font-size: 0.7rem; color: #666; font-weight: normal; }
        .search-container { display: flex; align-items: center; border: 1px solid #ccc; border-radius: 4px; overflow: hidden; }
        .search-container input { border: none; padding: 8px 12px; outline: none; width: 200px; font-size: 0.85rem; color: #000; }
        .search-container button { background: white; border: none; padding: 8px 12px; cursor: pointer; color: #555; }
        .global-nav { display: flex; justify-content: space-between; padding: 0 20px; font-size: 0.85rem; font-weight: bold; color: #444; }
        .global-nav a { text-decoration: none; color: inherit; padding: 5px 10px; }
        
        /* -------------------------------------------
           Normal (Public) Content Styles
        ------------------------------------------- */
        .public-content h2, .public-content h3 { color: var(--corp-blue); border-bottom: 1px solid #eaeaea; padding-bottom:10px; }
        .public-content p { line-height: 2.0; margin-bottom: 20px; }
        .prof-img { width:250px; border-radius:8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .prof-img.left { float:left; margin: 0 20px 20px 0; }
        .corp-table { width:100%; border-collapse:collapse; margin-bottom:30px; }
        .corp-table th, .corp-table td { border:1px solid #eaeaea; padding:12px; }
        .corp-table th { background:#f9f9f9; width:25%; }
        .news-list p { border-bottom:1px solid #eee; padding-bottom:15px; }
        .news-list .date { color: var(--corp-blue); font-weight:bold; }
        .member-card { display:flex; gap:20px; border-bottom:1px solid #eee; padding-bottom:20px; margin-bottom:20px; }
        .member-card img { width:120px; height: 120px; border-radius:50%; object-fit:cover; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .maintenance-box { border:1px solid #e74c3c; color:#e74c3c; padding:15px; border-radius:5px; font-size:0.9rem; }
        .error-msg { color:#e74c3c; font-weight:bold; font-size:1.1rem; }
        .internal-memo { color:#777; border-top:1px dashed #ccc; padding-top:15px; margin-top:30px; }
        .signature { text-align:right; font-weight:bold; color:var(--corp-blue); margin-top:20px; }


        /* -------------------------------------------
           Secret Mode (Hacker/Cyber) Styles
        ------------------------------------------- */
        .secret-mode { background: var(--secret-bg) !important; color: var(--secret-text) !important; font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif !important;}
        .secret-mode header { border-bottom: 1px solid #333; background: #000; }
        .secret-mode .logo-text, .secret-mode .logo-sub, .secret-mode .logo-mark { color: var(--secret-accent); }
        .secret-mode .search-container { border-color: #444; }
        .secret-mode .search-container input { background: #111; color: #fff; }
        .secret-mode .search-container button { background: #333; color: var(--secret-accent); }
        .secret-mode .global-nav { color: #888; }
        
        .secret-mode h2 { color: var(--secret-accent); border-bottom: 1px solid #333; padding-bottom:10px; font-size:1.4rem; }
        .secret-mode h3 { color: #fff; margin-top: 30px; border-left: 4px solid var(--secret-accent); padding-left:10px; font-size:1.1rem; }
        .secret-mode p, .secret-mode li { line-height: 2.0; margin-bottom: 20px; font-size:0.95rem; }
        .secret-mode .interviewer { color: #aaa; }
        .secret-mode .meta-info { color: #666; font-size:0.85rem; border-bottom: 1px dashed #333; padding-bottom:10px; }
        
        .secret-mode .terminal-box { background: rgba(0,255,0,0.05); border: 1px solid #333; padding: 20px; border-radius: 5px; margin-bottom:20px; }
        .secret-mode .terminal-box.green-border { border-left: 4px solid var(--secret-accent); }
        .secret-mode .terminal-box.red-border { border-left: 4px solid #ff3333; }
        .secret-mode .status-box { background: #110000; border: 1px solid #ff3333; color: #ff9999; padding: 20px; text-align: center; margin-top: 40px; }
        .secret-mode .status-box h3 { color:#ff3333; margin-top:0; border:none; }
        
        .secret-mode .prof-img { width:300px; border: 1px solid #333; filter: grayscale(100%) contrast(1.2); }
        .secret-mode .prof-img.left { float:left; margin: 0 20px 20px 0; }
        .secret-mode .prof-img.right { float:right; margin: 0 0 20px 20px; }

    </style>
</head>
<body>
<div id="web-site" class="secret-mode">
    <header>
        <div class="header-top">
            <div class="logo-area">
                <div class="logo-mark">SC</div>
                <div class="logo-text">シン・コギト株式会社<br><span class="logo-sub">AI技術で、新しい世界を。</span></div>
            </div>
            <form action="results.html" method="GET" class="search-container">
                <input type="text" name="q" placeholder="サイト内を検索" required>
                <button type="submit">🔍</button>
            </form>
        </div>
        <nav class="global-nav">
            <a href="index.html">HOME</a><a href="p2.html">ニュース</a><a href="p3.html">会社案内</a><a href="p4.html">代表あいさつ</a><a href="p5.html">研究メンバー</a><a href="p6.html">お問い合わせ</a>
        </nav>
    </header>
    <div id="content-body">
        <div class="rich-content secret-content">
    <div class="content-section" style="padding: 40px; text-align: center;">
        <h2 style='margin-top:0;'>Vocal-Sync 広告イメージ</h2>
        <p style="margin-bottom: 20px;">あなたの日常に、無意識の最適化を。</p>
        <div style="width: 100%; max-width: 600px; margin: 0 auto; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); overflow: hidden;">
            <img src="images/広告イメージ.jpeg" onclick="openModal(this.src)" alt="Vocal-Sync 広告イメージ" style="width: 100%; display: block; border-radius: 10px; cursor: pointer;">
        </div>
        <p style="margin-top: 20px; font-size: 0.9rem; color: #666;">メモ：日本語がおかしい部分があるので要修正。</p>
    </div>

    <!-- 画像拡大用モーダルコンテナ -->
    <div id="imageModal" onclick="closeModal()" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); align-items: center; justify-content: center; cursor: zoom-out;">
        <img id="modalImage" style="max-width: 90%; max-height: 90%; border-radius: 8px; border: 2px solid #555; box-shadow: 0 4px 20px rgba(0,0,0,0.5); object-fit: contain; cursor: default;" onclick="event.stopPropagation();">
    </div>

    <script>
        function openModal(src) {
            var modal = document.getElementById('imageModal');
            var modalImg = document.getElementById('modalImage');
            modal.style.display = "flex";
            modalImg.src = src;
        }
        function closeModal() {
            var modal = document.getElementById('imageModal');
            var modalImg = document.getElementById('modalImage');
            modal.style.display = "none";
        }
    </script>
</div>
        <br><br><a href="index.html" id="back-link" style="color: var(--secret-accent);">← トップへ戻る</a>
        </div>
    <div style="margin-top: auto; padding: 15px 30px; display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px solid #eaeaea; border-color: #333; color: #555;">
        <div style="font-size: 0.75rem; color: #999;">※このWebサイトの内容はフィクションであり、実在の人物・団体とは一切関係がありません。</div>
        <div style="font-size: 1rem; color: #777; font-weight: bold; font-family: inherit; letter-spacing: 1px;"><span style='color: #eee;'>55</span><span style='color: #555;'>/59(LV4)</span></div>
    </div>
</div>
<div id="chat-window">
    <div class="chat-header">
        <span>📶 SYNC_COMM LINK</span>
        <button class="btn-clear" onclick="clearChat()">ログ消去</button>
    </div>
    <div id="chat-log"></div>
    <div id="options-area"></div>
</div>

<script>
    let chatHistory = JSON.parse(localStorage.getItem('chatHistory')) || [];
    
    const baseScenarios = {
        "start": [
            { text: "新しい情報があったよ", next: "info" },
            { text: "まだよくわからないな……", next: "dontknow" },
            { text: "【ヒント】このページで何か気になるところある？", next: "back" }
        ],
        "info": { msg: "ほんと！？ そこに書いてあるキーワードとかをまた検索してみたらいいのかな？", next: "start" },
        "dontknow": { msg: "あせらずに、サイトの隅々まで見てみよう！", next: "start" },
        "back": { msg: "うーん…特には…", next: "start" }
    };
    const pageScenarios = {"start":[{"text":"怪しすぎる広告だな…","next":"info"},{"text":"まだよくわからないな……","next":"dontknow"},{"text":"【ヒント】このページで何か気になるところある？","next":"back"}],"info":{"msg":"私このアプリ使ってるかも！","next":"start"},"dontknow":{"msg":"あせらずに、サイトの隅々まで見てみよう！","next":"start"},"back":{"msg":"うーん、さすがに一つぐらいは手がかりになりそうなキーワードがありそうだけど…","next":"start"}};
    const scenarios = Object.assign({}, baseScenarios, pageScenarios);

    function saveAndRender() {
        const log = document.getElementById('chat-log');
        log.innerHTML = "";
        chatHistory.forEach(m => {
            const div = document.createElement('div');
            div.className = `msg ${m.sender}`;
            div.innerText = (m.sender === 'yu' ? 'ゆりかっぺ：' : '自分：') + m.text;
            log.appendChild(div);
        });
        requestAnimationFrame(() => { log.scrollTop = log.scrollHeight; });
        localStorage.setItem('chatHistory', JSON.stringify(chatHistory));
    }

    function showOptions(key) {
        const area = document.getElementById('options-area');
        area.innerHTML = "";
        const opts = scenarios[key];
        if (Array.isArray(opts)) {
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "opt";
                btn.innerText = opt.text;
                btn.onclick = () => {
                    chatHistory.push({ sender: 'me', text: opt.text });
                    saveAndRender();
                    area.querySelectorAll('button').forEach(b => b.disabled = true);
                    setTimeout(() => {
                        const res = scenarios[opt.next];
                        if (res.msg) chatHistory.push({ sender: 'yu', text: res.msg });
                        saveAndRender();
                        showOptions(res.next);
                    }, 800);
                };
                area.appendChild(btn);
            });
        }
    }

    function clearChat() {
        if(confirm("通信履歴を消去してリセットしますか？")) {
            localStorage.clear();
            window.location.reload();
        }
    }

    const pageId = "p55";
    function triggerAutoSend() {
        const autoSentKey = 'autoSent_' + pageId;
        const hasAutoSent = localStorage.getItem(autoSentKey);
        if (!hasAutoSent) {
            const startOpts = scenarios["start"];
            if (Array.isArray(startOpts) && startOpts.length > 0) {
                const firstOpt = startOpts[0];
                setTimeout(() => {
                    chatHistory.push({ sender: 'me', text: firstOpt.text });
                    saveAndRender();
                    setTimeout(() => {
                        const res = scenarios[firstOpt.next];
                        if (res && res.msg) {
                            chatHistory.push({ sender: 'yu', text: res.msg });
                            saveAndRender();
                        }
                        localStorage.setItem(autoSentKey, 'true');
                    }, 800);
                }, 2000);
            }
        }
    }

    triggerAutoSend();

    saveAndRender();
    showOptions("start");
</script>
</body>
</html>
